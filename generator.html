<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Q-Random code generator</title>
  <meta name="description" content="double q-random code generator">
  <style>
    body { font-family: system-ui, sans-serif; padding: 2.5px; background: #f0f0f0; }
    input, button { padding: 5px; font-size: 16px; margin: 4px; }
    svg { background: none; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
  </style>
</head>
<body style="display:flex; flex-direction:column; align-items:center; align-content:center;">
<h1 style="margin:5px">Q-Random code generator</h1>
<div style="display:flex; flex-direction:column; align-items:center; align-content:center;">

  <div>first code text: <input type="text" id="text" placeholder="Enter text (e.g. Hello World)" style="width:400px;"></div>
  <div>second code text: <input type="text" id="text2" placeholder="Enter text (e.g. Hello World)" style="width:400px;"></div>
  <hr width="100%">
  <div> background hue (from 0 to 360): <input type=number id=bg> foreground hue (from 0 to 360): <input type=number id=fg> contrast: <input type=number id=contrast></div>
  <button onclick="generateSVG();generateSVG2()">Generate code</button>
  </div>
<div style="display:grid">
  <div id="output" style="grid-area:1/1; margin-top: 20px; "></div>
  <div id="output2" style="grid-area:1/1; margin-top: 20px; "></div>
</div>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>

  <script>
  default_light = 0.18; // 0-black , 0.18 - perfect mid/ 4.5 contrast, 1 - white
  function hslToRgb(h, s, l) {
    s /= 100;
    l /= 100;

    const k = n => (n + h / 30) % 12;
    const a = s * Math.min(l, 1 - l);

    const f = n =>
      l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));

    return [
      Math.round(255 * f(0)),
      Math.round(255 * f(8)),
      Math.round(255 * f(4))
    ];
  }

  // luminance
  function luminance([r, g, b]) {
    const srgb = [r, g, b].map(v => {
      v /= 255;
      return v <= 0.03928
        ? v / 12.92
        : Math.pow((v + 0.055) / 1.055, 2.4);
    });

    return 0.2126 * srgb[0] + 0.7152 * srgb[1] + 0.0722 * srgb[2];
  }

  // find color with target luminance
  function colorFromHueWithContrast(hue, saturation = 100, targetLuminance = 0.18) {
    let best = null;
    let bestDiff = Infinity;

    for (let l = 0; l <= 100; l += 0.1) {
      const rgb = hslToRgb(hue, saturation, l);
      const lum = luminance(rgb);

      const diff = Math.abs(lum - targetLuminance);

      if (diff < bestDiff) {
        bestDiff = diff;
        best = { rgb, l, lum };
      }
    }

    return best;
  }

  // helper: rgb → css
  function rgbToCss([r, g, b]) {
    return `rgb(${r}, ${g}, ${b})`;
  }

    function generateSVG() {
      const text = document.getElementById('text').value.trim() || "Hello QR!";
      const output = document.getElementById('output');
      output.innerHTML = '';

      // Create QR code (error correction level L, type number auto)
      const qr = qrcode(0, 'H');
      qr.addData(text);
      qr.make();

      const moduleCount = qr.getModuleCount();   // size of the matrix (e.g. 25 for version 2)
      const scale = 1;                           // 4× upscale per module
      const moduleSize = 20;                     // base size of one module in SVG units
      const size = moduleCount * moduleSize * scale;

      // Quiet zone (white border) in modules
      const quiet = 4;
      const totalModules = moduleCount + quiet * 2;
      const totalSize = totalModules * moduleSize * scale;
      function getLuminance(input) {
        const t = input / 9;

        // perceptual curve (smooth, bounded)
        const mid = 0.5;
        const spread = 0.45;

        const Lfg = mid + spread * (t * 2 - 1);      // -1..1 → range around mid
        const Linv = mid - spread * (t * 2 - 1);

        return {
          normal: Math.max(0, Math.min(1, Lfg)),
          inverted: Math.max(0, Math.min(1, Linv))
        };
      }
      let svgHTML = `<svg width="${totalSize}" height="${totalSize}" viewBox="0 0 ${totalSize} ${totalSize}" xmlns="http://www.w3.org/2000/svg">`;

      // Background (quiet zone + white areas)
      svgHTML += `<rect width="100%" height="100%" fill="${rgbToCss(colorFromHueWithContrast(bg.value,75,getLuminance(contrast.value)["normal"]).rgb)}"/>`;

      const offset = quiet * moduleSize * scale;   // start drawing content after quiet zone

      for (let row = 0; row < moduleCount; row++) {
        for (let col = 0; col < moduleCount; col++) {
          const isDark = qr.isDark(row, col);
          const x = offset + col * moduleSize * scale;
          const y = offset + row * moduleSize * scale;
          const s = moduleSize * scale;

          if (isDark) {
            // Blue square for black modules
            svgHTML += `
              <rect
                x="${x}" y="${y}"
                width="${s/2}" height="${s/2}"
                fill="${rgbToCss(colorFromHueWithContrast(fg.value,75,getLuminance(contrast.value)["inverted"]).rgb)}"/>
              <rect
                x="${x+s/2}" y="${y+s/2}"
                width="${s/2}" height="${s/2}"
                fill="${rgbToCss(colorFromHueWithContrast(fg.value,75,getLuminance(contrast.value)["inverted"]).rgb)}"/>
            `;
          }
        }
      }

      svgHTML += `</svg>`;

      output.innerHTML = svgHTML;
    }
    function generateSVG2() {
      const text2 = document.getElementById('text2').value.trim() || "Hello QR!";
      const output2 = document.getElementById('output2');
      output2.innerHTML = '';

      // Create QR code (error correction level L, type number auto)
      const qr = qrcode(0, 'H');
      qr.addData(text2);
      qr.make();

      const moduleCount = qr.getModuleCount();   // size of the matrix (e.g. 25 for version 2)
      const scale = 1;                           // 4× upscale per module
      const moduleSize = 20;                     // base size of one module in SVG units
      const size = moduleCount * moduleSize * scale;

      // Quiet zone (white border) in modules
      const quiet = 4;
      const totalModules = moduleCount + quiet * 2;
      const totalSize = totalModules * moduleSize * scale;

      function getLuminance(input) {
        const t = input / 9;

        // perceptual curve (smooth, bounded)
        const mid = 0.5;
        const spread = 0.45;

        const Lfg = mid + spread * (t * 2 - 1);      // -1..1 → range around mid
        const Linv = mid - spread * (t * 2 - 1);

        return {
          normal: Math.max(0, Math.min(1, Lfg)),
          inverted: Math.max(0, Math.min(1, Linv))
        };
      }

      let svgHTML = `<svg width="${totalSize}" height="${totalSize}" viewBox="0 0 ${totalSize} ${totalSize}" xmlns="http://www.w3.org/2000/svg">`;

      // Background (quiet zone + white areas)
      //svgHTML += `<rect width="100%" height="100%" fill="#ffffff"/>`;

      const offset = quiet * moduleSize * scale;   // start drawing content after quiet zone

      for (let row = 0; row < moduleCount; row++) {
        for (let col = 0; col < moduleCount; col++) {
          const isDark = qr.isDark(row, col);
          const x = offset + col * moduleSize * scale;
          const y = offset + row * moduleSize * scale;
          const s = moduleSize * scale;

          if (isDark) {
            // Blue square for black modules
            svgHTML += `
              <rect
                x="${x}" y="${y+s/2}"
                width="${s/2}" height="${s/2}"
                fill="${rgbToCss(colorFromHueWithContrast(fg.value,75,getLuminance(contrast.value)["inverted"]).rgb)}"/>
              <rect
                x="${x+s/2}" y="${y}"
                width="${s/2}" height="${s/2}"
                fill="${rgbToCss(colorFromHueWithContrast(fg.value,75,getLuminance(contrast.value)["inverted"]).rgb)}"/>
            `;
          }
        }
      }

      svgHTML += `</svg>`;

      output2.innerHTML = svgHTML;
    }
    // Demo on load
    window.onload = () => {
      document.getElementById('text').value = "test";
      generateSVG2();
      generateSVG();
    };
  </script>
</body>
</html>
