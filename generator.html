<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Q-Random code generator</title>
  <meta name="description" content="double q-random code generator">
  <style>
    body { font-family: system-ui, sans-serif; padding: 2.5px; background: #f0f0f0; }
    input, button { padding: 5px; font-size: 16px; margin: 4px; }
    svg { background: none; box-shadow: 0 4px 15px rgba(0,0,0,0.15); }
  </style>
</head>
<body style="display:flex; flex-direction:column; align-items:center; align-content:center;">
<h1 style="margin:5px">Q-Random code generator</h1>
<div style="display:flex; flex-direction:column; align-items:center; align-content:center;">

  <div>first code text: <input type="text" id="text" placeholder="Enter text (e.g. Hello World)" style="width:400px;"></div>
  <div>second code text: <input type="text" id="text2" placeholder="Enter text (e.g. Hello World)" style="width:400px;"></div>
  <hr width="100%">
  <div> background hue (from 0 to 360): <input type=number id=bg> foreground hue (from 0 to 360): <input type=number id=fg> contrast: <input type=number id=contrast></div>
  <button onclick="generateSVG();generateSVG('2',false);">Generate code</button>
  </div>
<div style="display:grid">
  <div id="output" style="grid-area:1/1; margin-top: 20px; "></div>
  <div id="output2" style="grid-area:1/1; margin-top: 20px; "></div>
</div>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>

  <script>
  default_light = 0.18; // 0-black , 0.18 - perfect mid/4.5 contrast, 1 - white
  function hslToRgb(h, s, l) {
    s /= 100;
    l /= 100;

    const k = n => (n + h / 30) % 12;
    const a = s * Math.min(l, 1 - l);

    const f = n =>
      l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));

    return [
      Math.round(255 * f(0)),
      Math.round(255 * f(8)),
      Math.round(255 * f(4))
    ];
  }

  // luminance
  function luminance([r, g, b]) {
    const srgb = [r, g, b].map(v => {
      v /= 255;
      return v <= 0.03928
        ? v / 12.92
        : Math.pow((v + 0.055) / 1.055, 2.4);
    });

    return 0.2126 * srgb[0] + 0.7152 * srgb[1] + 0.0722 * srgb[2];
  }

  // find color with target luminance
  function colorFromHueWithContrast(hue, saturation = 100, targetLuminance = 0.18) {
    let best = null;
    let bestDiff = Infinity;

    for (let l = 0; l <= 100; l += 0.1) {
      const rgb = hslToRgb(hue, saturation, l);
      const lum = luminance(rgb);

      const diff = Math.abs(lum - targetLuminance);

      if (diff < bestDiff) {
        bestDiff = diff;
        best = { rgb, l, lum };
      }
    }

    return best;
  }

  // helper: rgb → css
  function rgbToCss([r, g, b]) {
    return `rgb(${r}, ${g}, ${b})`;
  }

function generateSVG(suffix = '', hasBg = true) {
  const text = document.getElementById(`text${suffix}`).value.trim() || "Hello QR!";
  const output = document.getElementById(`output${suffix}`);
  output.innerHTML = '';

  const qr = qrcode(0, 'H');
  qr.addData(text);
  qr.make();

  const moduleCount = qr.getModuleCount();
  const s = 20; // consolidated moduleSize * scale
  const totalSize = (moduleCount + 8) * s; // 8 is quiet zone (4 * 2)

  const t = contrast.value / 9;
  const Lfg = 0.5 + 0.45 * (t * 2 - 1);
  const Linv = 0.5 - 0.45 * (t * 2 - 1);
  const normalLum = Math.max(0, Math.min(1, Lfg));
  const invertLum = Math.max(0, Math.min(1, Linv));

  let svgHTML = `<svg width="${totalSize}" height="${totalSize}" viewBox="0 0 ${totalSize} ${totalSize}" xmlns="http://www.w3.org/2000/svg">`;

  if (hasBg) {
    svgHTML += `<rect width="100%" height="100%" fill="${rgbToCss(colorFromHueWithContrast(bg.value, 75, normalLum).rgb)}"/>`;
  }

  const offset = 4 * s; // 4 modules quiet zone
  const fillStyle = rgbToCss(colorFromHueWithContrast(fg.value, 75, invertLum).rgb);
  const half = s / 2;

  for (let row = 0; row < moduleCount; row++) {
    for (let col = 0; col < moduleCount; col++) {
      if (qr.isDark(row, col)) {
        const x = offset + col * s;
        const y = offset + row * s;
        
        // If suffix is empty (''), use top-left/bottom-right corners. Otherwise, use bottom-left/top-right.
        const y1 = suffix === '' ? y : y + half;
        const y2 = suffix === '' ? y + half : y;

        svgHTML += `
          <rect x="${x}" y="${y1}" width="${half}" height="${half}" fill="${fillStyle}"/>
          <rect x="${x + half}" y="${y2}" width="${half}" height="${half}" fill="${fillStyle}"/>
        `;
      }
    }
  }

  output.innerHTML = svgHTML + `</svg>`;
}
    // Demo on load
    window.onload = () => {
      document.getElementById('text').value = "0";
      document.getElementById('text2').value = "1";
      generateSVG();
      generateSVG('2',false);
    };
  </script>
</body>
</html>
